name: Release & Deploy

on:
  # Fires automatically when the CI workflow passes on main
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  # Allows manual triggering from the Actions tab
  workflow_dispatch:

# Never cancel an in-flight staging deploy
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  deploy-staging:
    name: Deploy → Staging (dev.nailistiot.fun)
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy to staging
        run: railway up --detach --service find-my-nailist --environment staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
