name: Release & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: placeholder
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: placeholder
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: placeholder
      NEXT_PUBLIC_FIREBASE_APP_ID: placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test -- --no-coverage
      - run: npm run build

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      published: ${{ steps.sr.outputs.new_release_published }}
      version: ${{ steps.sr.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Semantic Release
        id: sr
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.published == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
