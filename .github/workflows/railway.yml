name: Release & Deploy

on:
  # Fires automatically when the CI workflow passes on main
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  # Allows manual triggering from the Actions tab
  workflow_dispatch:

# Never cancel an in-flight release — let it finish
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  NODE_VERSION: '20'

jobs:
  deploy-staging:
    name: Deploy → Staging (dev.nailistiot.fun)
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy to staging
        run: railway up --detach --service ${{ secrets.RAILWAY_SERVICE_STAGING }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: deploy-staging
    outputs:
      released: ${{ steps.detect.outputs.released }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: main
      - name: Get latest tag before release
        id: before
        run: echo "tag=$(git tag --sort=-version:refname | head -1 || echo none)" >> $GITHUB_OUTPUT
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install --no-save semantic-release @semantic-release/git
      - name: Semantic Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
      - name: Detect new release
        id: detect
        run: |
          git fetch --tags
          after=$(git tag --sort=-version:refname | head -1 || echo none)
          if [ "$after" != "${{ steps.before.outputs.tag }}" ]; then
            echo "released=true" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi

  deploy-prod:
    name: Deploy → Production (nailistiot.fun)
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy to production
        run: railway up --detach --service find-my-nailist
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
