version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: find_my_nailist_app
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
